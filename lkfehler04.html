<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Lernkartei</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --dark-green: #1b5e20;
            --accent-green: #81c784;
            --card-shadow: rgba(0, 0, 0, 0.2);
            --bg-color: #f1f8e9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* Flashcard 3D Flip Styles */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px var(--card-shadow);
            border-radius: 15px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            background-color: white;
            border: 4px solid var(--accent-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--light-green);
        }

        .card-content {
            word-wrap: break-word;
            max-width: 100%;
            font-weight: bold;
            /* Dynamic font size will be handled by JS or CSS clamp */
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            color: var(--dark-green);
        }

        .note {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            font-weight: normal;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .nav-buttons {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background-color: var(--dark-green);
        }

        button:active {
            transform: scale(0.98);
        }

        .secondary-btn {
            background-color: #607d8b;
        }

        .secondary-btn:hover {
            background-color: #455a64;
        }

        .instructions {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .flashcard-wrapper {
                height: 250px;
            }
            .controls {
                grid-template-columns: 1fr;
            }
            .nav-buttons {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Russisch-Vokabeln</h1>
        <p>Interaktive Lernkartei</p>
    </header>

    <div class="container">
        <div class="progress" id="progress">1 / 52</div>

        <div class="flashcard-wrapper" id="card-wrapper" onclick="flipCard()" role="button" tabindex="0">
            <div class="flashcard" id="card-inner">
                <div class="card-face card-front">
                    <div class="card-content" id="front-text">Vorderseite</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-content" id="back-text">Rückseite</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="nav-buttons">
                <button onclick="prevCard()">← Vorherige</button>
                <button onclick="nextCard()">Nächste →</button>
            </div>
            <button class="secondary-btn" onclick="shuffleCards()">Mischen</button>
            <button class="secondary-btn" onclick="goToStart()">An den Anfang</button>
        </div>

        <div class="instructions">
            <b>Steuerung:</b> Karte umdrehen mit [Leertaste/Enter/Klick] <br> 
            Navigation mit [Pfeiltasten links/rechts] <br>
            [Pos1] zum Anfang springen
        </div>
    </div>

    <script>
        const rawVocabulary = `1.	о́шибка – Fehler
2.	иностра́нец – Ausländer
3.	изуча́ть / изучи́ть – erlernen, studieren
4.	замеча́ть / заме́тить – bemerken
5.	популя́рный – beliebt, populär
6.	исправля́ть / испра́вить – korrigieren, verbessern
7.	объясня́ть / объясни́ть – erklären
8.	устава́ть / уста́ть – müde werden
9.	уста́вший – müde, ermüdet
10.	вчера́ – gestern
11.	сего́дня – heute
12.	за́втра – morgen
13.	сейча́с – jetzt
14.	везти́ / повезти́ – Glück haben (unpersönlich)
15.	выи́грывать / вы́играть – gewinnen
16.	лотере́я – Lotterie
17.	опа́здывать / опозда́ть – sich verspäten
18.	рабо́та – Arbeit
19.	мо́жно – man kann, man darf
20.	нельзя́ – man darf nicht, es ist verboten
21.	кури́ть / покури́ть – rauchen
22.	е́хать / пое́хать – fahren (mit einem Fahrzeug)
23.	е́здить / съе́здить – fahren (regelmäßig oder hin und zurück)
24.	маши́на – Auto
25.	авто́бус – Bus
26.	трамва́й – Straßenbahn
27.	метро́ – Metro, U-Bahn
28.	по́езд – Zug
29.	и так да́лее – und so weiter
30.	колле́га – Kollege, Kollegin
31.	мужчи́на – Mann
32.	же́нщина – Frau
33.	покупа́ть / купи́ть – kaufen
34.	пода́рок – Geschenk
35.	звони́ть / позвони́ть – anrufen, telefonieren
36.	учи́ться / научи́ться – lernen, studieren
37.	цель – Ziel
38.	пробле́ма – Problem
39.	иде́я – Idee
40.	но́вый – neu
41.	хоро́ший – gut
42.	гла́вный – wichtigste, Haupt-
43.	мно́го – viel, viele (Menge)
44.	мно́гие – viele (eine Vielzahl von)
45.	кни́га – Buch
46.	страна́ – Land
47.	посеща́ть / посети́ть – besuchen
48.	зна́чить / озна́чать – bedeuten
49.	то́же – auch (bezieht sich auf eine andere Person)
50.	та́кже – auch, ebenfalls (bezieht sich auf eine weitere Sache)
51.	ру́сский – russisch
52.	И́ра – Ira`;

        let cards = [];
        let currentIndex = 0;

        // Vokabelliste parsen
        function parseVocabulary() {
            const lines = rawVocabulary.trim().split('\n');
            cards = lines.map(line => {
                // Regex um Nummerierung am Anfang und Trenner " – " zu finden
                const cleanLine = line.replace(/^\d+\.\s*/, '');
                const parts = cleanLine.split(' – ');
                return {
                    front: parts[0] ? parts[0].trim() : "",
                    back: parts[1] ? parts[1].trim() : ""
                };
            });
        }

        function updateUI() {
            const cardInner = document.getElementById('card-inner');
            const frontText = document.getElementById('front-text');
            const backText = document.getElementById('back-text');
            const progress = document.getElementById('progress');

            // Karte zurückdrehen bevor Inhalt wechselt
            cardInner.classList.remove('is-flipped');

            setTimeout(() => {
                const current = cards[currentIndex];
                frontText.innerText = current.front;
                backText.innerText = current.back;
                
                // Dynamische Schriftgröße (Einfache Logik)
                adjustFontSize(frontText, current.front);
                adjustFontSize(backText, current.back);

                progress.innerText = `${currentIndex + 1} / ${cards.length}`;
            }, 150);
        }

        function adjustFontSize(element, text) {
            if (text.length > 25) {
                element.style.fontSize = "1.1rem";
            } else if (text.length > 15) {
                element.style.fontSize = "1.5rem";
            } else {
                element.style.fontSize = ""; // Nutzt CSS clamp
            }
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateUI();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function goToStart() {
            currentIndex = 0;
            updateUI();
        }

        function shuffleCards() {
            // Fisher-Yates Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            goToStart();
        }

        // Tastatursteuerung
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                case 'Enter':
                    e.preventDefault();
                    flipCard();
                    break;
                case 'ArrowLeft':
                    prevCard();
                    break;
                case 'ArrowRight':
                    nextCard();
                    break;
                case 'Home':
                    goToStart();
                    break;
            }
        });

        // Initialisierung
        parseVocabulary();
        updateUI();

        // Fokus auf Karte für Tastatursteuerung ermöglichen
        document.getElementById('card-wrapper').focus();
    </script>
</body>
</html>

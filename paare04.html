<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Quiz: Logische Paare</title>
    <style>
        :root {
            --primary-color: #673ab7;
            --secondary-color: #f3e5f5;
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f0f2f5;
            --text-dark: #2c3e50;
            /* Farben für die Lösung (10 Paare) */
            --sol-0: #FFADAD; --sol-1: #FFD6A5; --sol-2: #FDFFB6; --sol-3: #CAFFBF;
            --sol-4: #9BF6FF; --sol-5: #A0C4FF; --sol-6: #BDB2FF; --sol-7: #FFC6FF;
            --sol-8: #E2ECE9; --sol-9: #D0F4DE;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            max-width: 600px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 0.9rem;
        }

        .btn-restart { background-color: var(--primary-color); color: white; }
        .btn-solution { background-color: #607d8b; color: white; }
        .btn:hover { opacity: 0.9; }

        .pairing-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            background: white;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            user-select: none;
        }

        .item.selected {
            border-color: var(--primary-color);
            background-color: var(--secondary-color);
            transform: scale(1.02);
        }

        .item.matched {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        /* Lösungsvisualisierung via CSS Klassen */
        .sol-mode[data-id="0"] { background-color: var(--sol-0) !important; border-color: #777; }
        .sol-mode[data-id="1"] { background-color: var(--sol-1) !important; border-color: #777; }
        .sol-mode[data-id="2"] { background-color: var(--sol-2) !important; border-color: #777; }
        .sol-mode[data-id="3"] { background-color: var(--sol-3) !important; border-color: #777; }
        .sol-mode[data-id="4"] { background-color: var(--sol-4) !important; border-color: #777; }
        .sol-mode[data-id="5"] { background-color: var(--sol-5) !important; border-color: #777; }
        .sol-mode[data-id="6"] { background-color: var(--sol-6) !important; border-color: #777; }
        .sol-mode[data-id="7"] { background-color: var(--sol-7) !important; border-color: #777; }
        .sol-mode[data-id="8"] { background-color: var(--sol-8) !important; border-color: #777; }
        .sol-mode[data-id="9"] { background-color: var(--sol-9) !important; border-color: #777; }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .feedback-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .pairing-container { grid-template-columns: 1fr; }
            .item { font-size: 0.9rem; padding: 10px; min-height: 50px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Logische Paare</h1>
        <p>Wähle links einen Satz und rechts die passende Fortsetzung!</p>
    </div>

    <div class="controls">
        <button class="btn btn-solution" id="solution-toggle" onclick="toggleSolution()">Lösung anzeigen</button>
        <button class="btn btn-restart" onclick="restartGame()">Neustart</button>
    </div>

    <div class="pairing-container" id="game-area">
        <div class="column" id="left-column"></div>
        <div class="column" id="right-column"></div>
    </div>

    <div id="explanation-overlay" class="overlay">
        <div class="feedback-box">
            <h3 style="color: var(--success-color);">Richtig kombiniert! ✓</h3>
            <p id="explanation-text" style="font-size: 1.1rem; line-height: 1.5; margin: 20px 0;"></p>
            <button class="next-btn" onclick="closeFeedback()">Weiter</button>
        </div>
    </div>

    <script>
        const pairs = [
            { id: 0, left: "Моя подруга любит мелодрамы.", right: "Я тоже люблю мелодрамы.", expl: "Zwei verschiedene Personen tun das Gleiche -> 'тоже'." },
            { id: 1, left: "Я люблю мелодрамы.", right: "Также я люблю ужастики.", expl: "Eine Person zählt mehrere Dinge auf -> 'также'." },
            { id: 2, left: "Сегодня был трудный день.", right: "Я очень устал.", expl: "Aktueller Zustand 'müde sein' -> 'устал' (ohne Hilfsverb)." },
            { id: 3, left: "Я купил лотерейный билет.", right: "Мне повезло!", expl: "Glück haben -> 'мне повезло' (ohne Hilfsverb)." },
            { id: 4, left: "Здесь висит знак «не курить».", right: "Здесь нельзя курить.", expl: "Verbote -> 'нельзя'. 'Не можно' existiert nicht." },
            { id: 5, left: "Где ты? Я сижу в поезде.", right: "Я сейчас в поезде.", expl: "Ort im Fahrzeug -> Präposition 'в' + Präpositiv." },
            { id: 6, left: "Я хочу выучить русский язык.", right: "Это моя главная цель.", expl: "Das Wort 'цель' (Ziel) ist im Russischen weiblich." },
            { id: 7, left: "Я путаю русские приставки.", right: "Это моя большая проблема.", expl: "Das Wort 'проблема' ist im Russischen weiblich." },
            { id: 8, left: "Я купил хлеб, сыр, молоко...", right: "И так далее.", expl: "Und so weiter -> 'и так далее'." },
            { id: 9, left: "В моей библиотеке тысячи книг.", right: "Я прочитал много книг.", expl: "Mengenangabe -> 'много' + Genitiv Plural." }
        ];

        let selectedLeft = null;
        let selectedRight = null;
        let matchedCount = 0;
        let isSolutionMode = false;

        function initGame() {
            const leftCol = document.getElementById('left-column');
            const rightCol = document.getElementById('right-column');
            leftCol.innerHTML = '';
            rightCol.innerHTML = '';
            matchedCount = 0;
            isSolutionMode = false;
            document.getElementById('solution-toggle').innerText = "Lösung anzeigen";

            // Linke Spalte mischen
            const shuffledLeft = [...pairs].sort(() => Math.random() - 0.5);
            shuffledLeft.forEach(pair => {
                const div = createItem(pair.left, pair.id, 'left');
                leftCol.appendChild(div);
            });

            // Rechte Spalte mischen
            const shuffledRight = [...pairs].sort(() => Math.random() - 0.5);
            shuffledRight.forEach(pair => {
                const div = createItem(pair.right, pair.id, 'right');
                rightCol.appendChild(div);
            });
        }

        function createItem(text, id, side) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = text;
            div.dataset.id = id;
            div.dataset.side = side;
            div.onclick = () => selectItem(div);
            return div;
        }

        function selectItem(element) {
            if (isSolutionMode || element.classList.contains('matched')) return;

            const side = element.dataset.side;
            if (side === 'left') {
                if (selectedLeft) selectedLeft.classList.remove('selected');
                selectedLeft = element;
            } else {
                if (selectedRight) selectedRight.classList.remove('selected');
                selectedRight = element;
            }
            element.classList.add('selected');

            if (selectedLeft && selectedRight) {
                if (selectedLeft.dataset.id === selectedRight.dataset.id) {
                    const pair = pairs.find(p => p.id == selectedLeft.dataset.id);
                    document.getElementById('explanation-text').innerText = pair.expl;
                    document.getElementById('explanation-overlay').style.display = 'flex';
                } else {
                    const sL = selectedLeft; const sR = selectedRight;
                    sL.style.borderColor = 'var(--error-color)'; sR.style.borderColor = 'var(--error-color)';
                    setTimeout(() => {
                        sL.classList.remove('selected'); sR.classList.remove('selected');
                        sL.style.borderColor = ''; sR.style.borderColor = '';
                    }, 500);
                    selectedLeft = null; selectedRight = null;
                }
            }
        }

        function closeFeedback() {
            document.getElementById('explanation-overlay').style.display = 'none';
            selectedLeft.classList.add('matched');
            selectedRight.classList.add('matched');
            selectedLeft = null;
            selectedRight = null;
            matchedCount++;
            if (matchedCount === pairs.length) {
                alert("Hervorragend! Alle Paare gefunden.");
            }
        }

        function toggleSolution() {
            isSolutionMode = !isSolutionMode;
            const items = document.querySelectorAll('.item');
            const btn = document.getElementById('solution-toggle');

            if (isSolutionMode) {
                btn.innerText = "Lösung ausblenden";
                items.forEach(item => {
                    item.classList.remove('selected', 'matched'); // Alles wieder einblenden
                    item.classList.add('sol-mode');
                    item.style.visibility = 'visible';
                    item.style.opacity = '1';
                });
            } else {
                btn.innerText = "Lösung anzeigen";
                items.forEach(item => item.classList.remove('sol-mode'));
                initGame(); // Spiel nach Lösungsschau neu mischen für Lerneffekt
            }
        }

        function restartGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>

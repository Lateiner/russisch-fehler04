<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Memory: Fehler & Korrektur</title>
    <style>
        :root {
            --primary-color: #3f51b5;
            --correct-color: #4CAF50;
            --wrong-color: #f44336;
            --bg-color: #f0f2f5;
            --card-back: #2c3e50;
            --card-front: #ffffff;
            /* Farben für die Lösung (10 Paare) */
            --p0: #FFADAD; --p1: #FFD6A5; --p2: #FDFFB6; --p3: #CAFFBF;
            --p4: #9BF6FF; --p5: #A0C4FF; --p6: #BDB2FF; --p7: #FFC6FF;
            --p8: #E2ECE9; --p9: #D0F4DE;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 10px; }
        .header h1 { font-size: 1.5rem; margin: 5px 0; }

        .stats { margin-bottom: 10px; font-weight: bold; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-solution { background-color: #607d8b; color: white; }
        .btn-restart { background-color: var(--primary-color); color: white; }
        .btn:hover { opacity: 0.9; }

        /* Das Spielfeld */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }

        /* Karte-Styling (kleiner gestaltet) */
        .card {
            aspect-ratio: 1 / 1;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            user-select: none;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 6px;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-sizing: border-box;
            border-radius: 6px;
            font-size: 0.75rem;
            text-align: center;
            word-wrap: break-word;
        }

        .card-back { background-color: var(--card-back); color: white; font-size: 1.2rem; }
        .card-front { background-color: var(--card-front); color: #333; transform: rotateY(180deg); border: 1px solid #ccc; }

        /* Gefundene Paare verschwinden lassen */
        .card.matched {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        /* Lösungsvisualisierung */
        .solution-mode .card-inner { transform: rotateY(180deg); }
        .solution-mode .card[data-pair="0"] .card-front { background-color: var(--p0); }
        .solution-mode .card[data-pair="1"] .card-front { background-color: var(--p1); }
        .solution-mode .card[data-pair="2"] .card-front { background-color: var(--p2); }
        .solution-mode .card[data-pair="3"] .card-front { background-color: var(--p3); }
        .solution-mode .card[data-pair="4"] .card-front { background-color: var(--p4); }
        .solution-mode .card[data-pair="5"] .card-front { background-color: var(--p5); }
        .solution-mode .card[data-pair="6"] .card-front { background-color: var(--p6); }
        .solution-mode .card[data-pair="7"] .card-front { background-color: var(--p7); }
        .solution-mode .card[data-pair="8"] .card-front { background-color: var(--p8); }
        .solution-mode .card[data-pair="9"] .card-front { background-color: var(--p9); }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .explanation-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        /* Mobile Anpassung */
        @media (max-width: 500px) {
            .memory-grid { grid-template-columns: repeat(4, 1fr); }
            .card-front { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Russisch-Memory</h1>
        <p>Verbinde Fehler und Korrektur!</p>
    </div>

    <div class="stats">Gefundene Paare: <span id="pairs-count">0</span> / 10</div>

    <div class="controls">
        <button class="btn btn-solution" onclick="toggleSolution()">Lösung anzeigen</button>
        <button class="btn btn-restart" onclick="restartGame()">Neustart</button>
    </div>

    <div class="memory-grid" id="grid"></div>

    <div class="overlay" id="overlay">
        <div class="explanation-box">
            <h3 style="color:var(--correct-color)">Paar gefunden!</h3>
            <p id="explanation-text" style="font-size: 0.95rem; line-height: 1.4;"></p>
            <button class="next-btn" onclick="closeOverlay()">Weiter</button>
        </div>
    </div>

    <script>
        const pairs = [
            { w: "Я был устал", c: "Я устал", expl: "Sag einfach „Я устал“. Kein Hilfsverb in der Gegenwart nötig." },
            { w: "Мне было повезло", c: "Мне повезло", expl: "In der Wendung „Glück haben“ fällt „было“ weg." },
            { w: "Не можно", c: "Нельзя", expl: "„Не можно“ gibt es nicht. Verwende immer „Нельзя“." },
            { w: "Я на метро", c: "Я в метро", expl: "Bist du im Fahrzeug? Dann nutze die Präposition „в“." },
            { w: "И так дальше", c: "И так далее", expl: "Die feste Redewendung heißt „и так далее“." },
            { w: "Мой цель", c: "Моя цель", expl: "Das Wort „цель“ (Ziel) ist im Russischen weiblich." },
            { w: "Мой проблема", c: "Моя проблема", expl: "„Проблема“ ist weiblich, daher „моя“." },
            { w: "Хороший идея", c: "Хорошая идея", expl: "Weibliches Substantiv braucht die Endung -ая." },
            { w: "Многие книг", c: "Много книг", expl: "Bei Mengenangaben nutzt man „много“ + Genitiv." },
            { w: "Тоже (Aufzählung)", c: "Также (Aufzählung)", expl: "Bei Listen über dich selbst nutzt man „также“." }
        ];

        let cardsData = [];
        let flippedCards = [];
        let matchedCount = 0;
        let isSolutionActive = false;

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function restartGame() {
            matchedCount = 0;
            flippedCards = [];
            isSolutionActive = false;
            document.getElementById('pairs-count').innerText = "0";
            document.getElementById('grid').classList.remove('solution-mode');
            initGame();
        }

        function toggleSolution() {
            const grid = document.getElementById('grid');
            isSolutionActive = !isSolutionActive;
            if (isSolutionActive) {
                grid.classList.add('solution-mode');
            } else {
                grid.classList.remove('solution-mode');
            }
        }

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cardsData = [];

            pairs.forEach((pair, index) => {
                cardsData.push({ text: pair.w, id: index });
                cardsData.push({ text: pair.c, id: index });
            });

            shuffle(cardsData);

            cardsData.forEach((data) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.pair = data.id;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">?</div>
                        <div class="card-front">${data.text}</div>
                    </div>
                `;
                card.onclick = () => onCardClick(card);
                grid.appendChild(card);
            });
        }

        function onCardClick(card) {
            if (flippedCards.length === 2 || card.classList.contains('flipped') || card.classList.contains('matched') || isSolutionActive) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                if (flippedCards[0].dataset.pair === flippedCards[1].dataset.pair) {
                    matchedCount++;
                    document.getElementById('pairs-count').innerText = matchedCount;
                    setTimeout(() => showExplanation(flippedCards[0].dataset.pair), 500);
                } else {
                    setTimeout(() => {
                        flippedCards.forEach(c => c.classList.remove('flipped'));
                        flippedCards = [];
                    }, 1000);
                }
            }
        }

        function showExplanation(id) {
            document.getElementById('explanation-text').innerText = pairs[id].expl;
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
            flippedCards.forEach(c => c.classList.add('matched'));
            flippedCards = [];
            if (matchedCount === 10) alert("Super! Alle Fehler korrigiert.");
        }

        initGame();
    </script>
</body>
</html>
